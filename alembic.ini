# Alembic config for the bots mailbox. Single SQLite database.
#
# Users never invoke Alembic directly - run `uv run manage.py db setup`. The DB URL is built
# by migrations/env.py from config.settings (the same .env / .env.local cascade the app uses),
# so it is NOT set here.

[alembic]
# Migration scripts, relative to %(here)s (this ini's directory = repo root).
script_location = %(here)s/migrations

# Migration filename format: <epoch>__<rev>__<slug>.py
file_template = %%(epoch)d__%%(rev)s__%%(slug)s

# Prepend cwd to sys.path so the root-level `config` import resolves when run from the repo root.
prepend_sys_path = .

# Max length of the "slug" portion of a filename.
truncate_slug_length = 40

path_separator = os

[post_write_hooks]
# Run ruff on newly generated revision scripts so they pass the repo's lint immediately.
hooks = ruff_format, ruff
ruff_format.type = module
ruff_format.module = ruff
ruff_format.options = format --force-exclude REVISION_SCRIPT_FILENAME
ruff.type = module
ruff.module = ruff
ruff.options = check --fix --force-exclude REVISION_SCRIPT_FILENAME

# Logging (consumed by env.py).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
